<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Field Map Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --green:#2d5a27; --gl:#3d7a35; --gold:#c8952a; --goldl:#e8b84b;
  --dark:#1a2e18; --panel:#0f1e0d; --text:#e8f0e6; --dim:#7a9a76;
  --accent:#4caf50; --red:#ef5350; --orange:#ff9800;
}
html,body { height:100%; overflow:hidden; background:var(--dark); color:var(--text); font-family:'Courier New',monospace; }
#map { position:absolute; inset:0; bottom:52px; top:48px; }

#header {
  position:absolute; top:0; left:0; right:0; height:48px;
  background:var(--panel); border-bottom:1px solid var(--gl);
  display:flex; align-items:center; padding:0 8px; gap:6px; z-index:1000;
}
#header-title { color:var(--goldl); font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:bold; flex:1; }
#map-label { color:var(--dim); font-size:9px; display:block; margin-top:1px; }

#footer {
  position:absolute; bottom:0; left:0; right:0; height:52px;
  background:var(--panel); border-top:1px solid var(--gl);
  display:flex; align-items:center; padding:0 8px; gap:4px; z-index:1000;
}
.stat { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; }
.stat-label { font-size:7px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
.stat-val { font-size:11px; font-weight:bold; margin-top:1px; white-space:nowrap; }
.stat-val.on { color:var(--accent); }
.stat-val.warn { color:var(--orange); }
.stat-val.err { color:var(--red); }
.vdiv { width:1px; height:30px; background:var(--gl); flex-shrink:0; }

#toolbar {
  position:absolute; top:56px; right:8px;
  display:flex; flex-direction:column; gap:6px; z-index:900;
}
.tb-btn {
  width:42px; height:42px; border-radius:6px;
  background:var(--panel); border:1px solid var(--gl);
  color:var(--dim); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.tb-btn.active-red { border-color:var(--red); color:var(--red); background:rgba(239,83,80,.12); }
.tb-btn.active-gold { border-color:var(--gold); color:var(--goldl); background:rgba(200,149,42,.12); }

#load-pdf-btn {
  position:absolute; top:56px; left:8px;
  background:var(--panel); border:1px solid var(--gl);
  color:var(--dim); font-size:9px; letter-spacing:.08em; text-transform:uppercase;
  padding:6px 10px; border-radius:4px; cursor:pointer; z-index:900;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
#load-pdf-btn.has-map { border-color:var(--gold); color:var(--goldl); }

#fly-btns {
  position:absolute; bottom:60px; left:8px;
  display:flex; flex-direction:column; gap:6px; z-index:900;
}
.fly-btn {
  background:var(--panel); border:1px solid var(--gl);
  color:var(--dim); font-size:9px; letter-spacing:.07em; text-transform:uppercase;
  padding:6px 10px; border-radius:4px; cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.5); white-space:nowrap;
}

/* NOTE MODAL */
#note-modal {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:none; align-items:center; justify-content:center; z-index:2000;
}
#note-modal.show { display:flex; }
#note-box {
  background:var(--panel); border:1px solid var(--gold);
  border-radius:8px; padding:20px; width:88%; max-width:360px;
}
#note-box h3 { color:var(--goldl); font-size:12px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
#note-meta, #note-coords { font-size:9px; color:var(--dim); letter-spacing:.06em; margin-bottom:4px; }
.note-input-row { position:relative; margin-top:6px; }
#note-input {
  width:100%; background:var(--dark); border:1px solid var(--gl);
  color:var(--text); font-family:'Courier New',monospace; font-size:14px;
  padding:10px 44px 10px 10px; border-radius:4px; resize:none; height:80px;
}
#note-input:focus { outline:none; border-color:var(--gold); }
#mic-btn {
  position:absolute; right:6px; top:6px;
  width:32px; height:32px; border-radius:50%;
  background:var(--dark); border:1px solid var(--gl);
  color:var(--dim); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#mic-btn.listening { border-color:var(--red); color:var(--red); animation:micpulse 1s ease-in-out infinite; }
@keyframes micpulse { 0%,100%{opacity:1} 50%{opacity:.4} }

#photo-strip { display:flex; gap:6px; margin-top:8px; align-items:center; flex-wrap:wrap; }
#photo-btn {
  width:48px; height:48px; border-radius:6px; flex-shrink:0;
  background:var(--dark); border:1px solid var(--gl);
  color:var(--dim); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.photo-thumb-wrap { position:relative; }
.photo-thumb { width:48px; height:48px; border-radius:6px; object-fit:cover; border:1px solid var(--gl); cursor:pointer; }
.photo-del {
  position:absolute; top:-5px; right:-5px; width:16px; height:16px; border-radius:50%;
  background:var(--red); border:none; color:#fff; font-size:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

.note-btns { display:flex; gap:8px; margin-top:12px; }
.note-btn {
  flex:1; padding:10px; border-radius:4px; font-family:'Courier New',monospace;
  font-size:11px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border:1px solid;
}
#note-save { background:var(--green); border-color:var(--gl); color:var(--goldl); }
#note-delete { background:var(--dark); border-color:var(--red); color:var(--red); }
#note-cancel { background:var(--dark); border-color:var(--dim); color:var(--dim); }

/* EXPORT PANEL */
#export-panel {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--panel); border-top:1px solid var(--gl);
  padding:16px; transform:translateY(100%); transition:transform .3s; z-index:1500;
}
#export-panel.open { transform:translateY(0); }
#export-panel h3 { color:var(--goldl); font-size:11px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; }
.exp-row { display:flex; gap:8px; margin-bottom:8px; }
.exp-btn {
  flex:1; padding:11px; border-radius:4px; font-family:'Courier New',monospace;
  font-size:10px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  background:var(--green); border:1px solid var(--gl); color:var(--goldl);
}
.exp-btn:disabled { opacity:.4; cursor:default; }
#exp-close {
  width:100%; padding:10px; border-radius:4px; font-family:'Courier New',monospace;
  font-size:10px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  background:var(--dark); border:1px solid var(--dim); color:var(--dim); margin-top:4px;
}
.exp-stats { font-size:10px; color:var(--dim); margin-bottom:10px; }

#toast {
  position:fixed; top:56px; left:50%; transform:translateX(-50%);
  background:var(--panel); border:1px solid var(--gold); color:var(--goldl);
  padding:7px 14px; font-size:10px; letter-spacing:.08em; border-radius:4px;
  z-index:3000; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<div id="header">
  <div style="flex:1;min-width:0;">
    <div id="header-title">Field Map Viewer</div>
    <span id="map-label">No PDF loaded</span>
  </div>
</div>

<div id="map"></div>

<button id="load-pdf-btn" onclick="document.getElementById('pdf-input').click()">+ PDF Map</button>

<div id="toolbar">
  <button class="tb-btn" id="btn-track" onclick="toggleTrack()">⏺</button>
  <button class="tb-btn" id="btn-point" onclick="togglePointMode()">📍</button>
  <button class="tb-btn" id="btn-pdf" onclick="togglePDF()" style="display:none">🗺</button>
  <button class="tb-btn" onclick="document.getElementById('import-input').click()">⬇</button>
  <button class="tb-btn" onclick="toggleExport()">⬆</button>
</div>

<div id="fly-btns">
  <button class="fly-btn" onclick="flyToGPS()">➤ My Location</button>
  <button class="fly-btn" id="fly-map-btn" onclick="flyToMap()" style="display:none">➤ PDF Map</button>
</div>

<div id="footer">
  <div class="stat"><span class="stat-label">GPS</span><span class="stat-val err" id="s-gps">OFF</span></div>
  <div class="vdiv"></div>
  <div class="stat"><span class="stat-label">Acc</span><span class="stat-val" id="s-acc">—</span></div>
  <div class="vdiv"></div>
  <div class="stat"><span class="stat-label">Lat</span><span class="stat-val" id="s-lat">—</span></div>
  <div class="vdiv"></div>
  <div class="stat"><span class="stat-label">Lon</span><span class="stat-val" id="s-lon">—</span></div>
  <div class="vdiv"></div>
  <div class="stat"><span class="stat-label">Track</span><span class="stat-val" id="s-track">0</span></div>
  <div class="vdiv"></div>
  <div class="stat"><span class="stat-label">Points</span><span class="stat-val" id="s-pts">0</span></div>
</div>

<div id="note-modal">
  <div id="note-box">
    <h3>Capture Point</h3>
    <div id="note-meta"></div>
    <div id="note-coords"></div>
    <div class="note-input-row">
      <textarea id="note-input" placeholder="Type or tap 🎤 to dictate…"></textarea>
      <button id="mic-btn" onclick="toggleMic()">🎤</button>
    </div>
    <div id="photo-strip"></div>
    <div class="note-btns">
      <button class="note-btn" id="note-cancel" onclick="cancelPoint()">Cancel</button>
      <button class="note-btn" id="note-delete" onclick="deletePoint()" style="display:none">Delete</button>
      <button class="note-btn" id="note-save" onclick="savePoint()">Save</button>
    </div>
  </div>
</div>

<div id="export-panel">
  <h3>Export Data</h3>
  <div class="exp-stats" id="exp-stats"></div>
  <div class="exp-row">
    <button class="exp-btn" id="exp-track-btn" onclick="exportTrack()">Export Track (GeoJSON)</button>
  </div>
  <div class="exp-row">
    <button class="exp-btn" id="exp-pts-btn" onclick="exportPoints()">Export Points (GeoJSON)</button>
  </div>
  <div class="exp-row">
    <button class="exp-btn" onclick="clearTrack()">Clear Track</button>
    <button class="exp-btn" style="background:var(--dark);border-color:var(--red);color:var(--red);" onclick="clearPoints()">Clear Points</button>
  </div>
  <button id="exp-close" onclick="toggleExport()">Close</button>
</div>

<div id="toast"></div>
<input type="file" id="pdf-input" accept=".pdf,application/pdf" style="display:none">
<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" multiple>
<input type="file" id="import-input" accept=".geojson,.json,.gpx" style="display:none" multiple>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center:[44.13,-79.49], zoom:15, zoomControl:false, attributionControl:false });
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:22, maxNativeZoom:19
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

// ── STATE ─────────────────────────────────────────────────────────────────────
let gpsLat=null, gpsLon=null, gpsAcc=null;
let gpsMarker=null, gpsAccCircle=null;
let trackActive=false, trackLog=[], trackLine=null;
let pointMode=false, pendingLat=null, pendingLon=null;
let capturedPoints=[], pointMarkers=[];
let pdfOverlay=null, pdfVisible=true, pdfBounds=null;
let pendingPhotos=[], recognition=null, editingIdx=null;

// ── CSS ANIM ──────────────────────────────────────────────────────────────────
const _s = document.createElement('style');
_s.textContent = `@keyframes gpsring{0%{transform:scale(1);opacity:.6}100%{transform:scale(3.5);opacity:0}}`;
document.head.appendChild(_s);

// ── GPS ───────────────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { setGPSStatus('N/A','err'); return; }
  setGPSStatus('WAIT','warn');
  navigator.geolocation.watchPosition(onGPS, onGPSErr, { enableHighAccuracy:true, maximumAge:2000, timeout:15000 });
}
function setGPSStatus(t,c) { const el=document.getElementById('s-gps'); el.textContent=t; el.className='stat-val '+c; }
function onGPSErr() { setGPSStatus('ERR','err'); }

function onGPS(pos) {
  gpsLat=pos.coords.latitude; gpsLon=pos.coords.longitude; gpsAcc=pos.coords.accuracy;
  setGPSStatus('ON','on');
  document.getElementById('s-acc').textContent='±'+Math.round(gpsAcc)+'m';
  document.getElementById('s-acc').className='stat-val '+(gpsAcc<10?'on':gpsAcc<30?'warn':'err');
  document.getElementById('s-lat').textContent=gpsLat.toFixed(5);
  document.getElementById('s-lon').textContent=gpsLon.toFixed(5);
  const ll=[gpsLat,gpsLon];
  if (!gpsMarker) {
    const icon=L.divIcon({ className:'', html:`<div style="width:18px;height:18px;position:relative;">
      <div style="position:absolute;inset:0;border-radius:50%;background:rgba(76,175,80,.25);animation:gpsring 2s ease-out infinite;"></div>
      <div style="position:absolute;inset:4px;border-radius:50%;background:#4caf50;border:2px solid #fff;box-shadow:0 0 6px rgba(76,175,80,.8);"></div>
      </div>`, iconSize:[18,18], iconAnchor:[9,9] });
    gpsMarker=L.marker(ll,{icon,zIndexOffset:1000}).addTo(map);
    gpsAccCircle=L.circle(ll,{radius:gpsAcc,color:'#4caf50',fillColor:'#4caf50',fillOpacity:.07,weight:1}).addTo(map);
    flyToGPS();
  } else { gpsMarker.setLatLng(ll); gpsAccCircle.setLatLng(ll); gpsAccCircle.setRadius(gpsAcc); }
  if (trackActive) {
    trackLog.push([gpsLat,gpsLon]);
    document.getElementById('s-track').textContent=trackLog.length;
    if (!trackLine) trackLine=L.polyline(trackLog,{color:'#ff9800',weight:3,opacity:.85}).addTo(map);
    else trackLine.setLatLngs(trackLog);
  }
}

function flyToGPS() {
  if (gpsLat!==null) map.flyTo([gpsLat,gpsLon],Math.max(map.getZoom(),17),{duration:1});
  else showToast('GPS not yet available');
}

// ── TRACK ─────────────────────────────────────────────────────────────────────
function toggleTrack() {
  trackActive=!trackActive;
  const btn=document.getElementById('btn-track');
  if (trackActive) { btn.classList.add('active-red'); btn.textContent='⏹'; showToast('Track recording started'); }
  else {
    btn.classList.remove('active-red'); btn.textContent='⏺';
    saveTracksLocal();
    showToast('Track saved — '+trackLog.length+' pts');
  }
}
function clearTrack() {
  trackLog=[]; if (trackLine){map.removeLayer(trackLine);trackLine=null;}
  document.getElementById('s-track').textContent='0'; showToast('Track cleared');
}
function saveTracksLocal() {
  try {
    if (trackLog.length<2) return;
    const existing=JSON.parse(localStorage.getItem('fmv_tracks')||'[]');
    existing.push({time:new Date().toISOString(),coords:trackLog});
    localStorage.setItem('fmv_tracks',JSON.stringify(existing.slice(-10)));
  } catch(e){}
}

// ── POINTS ────────────────────────────────────────────────────────────────────
function togglePointMode() {
  pointMode=!pointMode;
  const btn=document.getElementById('btn-point');
  if (pointMode) { btn.classList.add('active-gold'); map.getContainer().style.cursor='crosshair'; showToast('Tap map to capture point'); }
  else { btn.classList.remove('active-gold'); map.getContainer().style.cursor=''; showToast('Point mode off'); }
}

map.on('click', function(e) {
  if (!pointMode) return;
  pendingLat=e.latlng.lat; pendingLon=e.latlng.lng;
  pendingPhotos=[]; editingIdx=null;
  document.getElementById('note-input').value='';
  document.getElementById('note-box').querySelector('h3').textContent='Capture Point';
  document.getElementById('note-meta').textContent='';
  document.getElementById('note-coords').textContent='';
  document.getElementById('note-delete').style.display='none';
  renderPhotoStrip();
  document.getElementById('note-modal').classList.add('show');
  setTimeout(()=>document.getElementById('note-input').focus(),100);
});

function createPointMarker(pt, idx) {
  const num=idx+1;
  const hasPhoto=pt.photos&&pt.photos.length>0;
  const imported=pt.imported||false;
  const color=hasPhoto?'#4fc3f7':(imported?'#a5d6a7':'#e8b84b');
  const size=28;
  const icon=L.divIcon({ className:'', html:`<div style="position:relative;width:${size}px;height:${size}px;">
    <div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;">
      <span style="font-family:'Courier New',monospace;font-size:10px;font-weight:bold;color:#1a2e18;">${num}</span>
    </div>
    ${hasPhoto?`<div style="position:absolute;top:-4px;right:-4px;font-size:9px;">📷</div>`:''}
  </div>`, iconSize:[size,size], iconAnchor:[size/2,size/2] });
  const m=L.marker([pt.lat,pt.lon],{icon}).addTo(map);
  m.on('click',()=>openEditModal(idx));
  pointMarkers[idx]=m;
  return m;
}

function refreshMarker(idx) {
  if (pointMarkers[idx]){map.removeLayer(pointMarkers[idx]);pointMarkers[idx]=null;}
  createPointMarker(capturedPoints[idx],idx);
}

function openEditModal(idx) {
  const pt=capturedPoints[idx];
  editingIdx=idx;
  pendingPhotos=(pt.photos||[]).map((d,i)=>({dataUrl:d,name:'photo_'+i}));
  document.getElementById('note-input').value=pt.note||'';
  document.getElementById('note-box').querySelector('h3').textContent='Point '+(pt.num||idx+1);
  document.getElementById('note-meta').textContent=pt.timeDisplay||'';
  document.getElementById('note-coords').textContent=pt.lat.toFixed(5)+', '+pt.lon.toFixed(5);
  document.getElementById('note-delete').style.display='block';
  renderPhotoStrip();
  document.getElementById('note-modal').classList.add('show');
}

function savePoint() {
  if (recognition){recognition.stop();recognition=null;}
  document.getElementById('mic-btn').classList.remove('listening');
  const note=document.getElementById('note-input').value.trim();
  if (editingIdx!==null) {
    capturedPoints[editingIdx].note=note;
    capturedPoints[editingIdx].photos=pendingPhotos.map(p=>p.dataUrl);
    refreshMarker(editingIdx);
    savePointsLocal();
    document.getElementById('note-modal').classList.remove('show');
    showToast('Point updated'); editingIdx=null;
  } else {
    const now=new Date();
    const pt={ num:capturedPoints.length+1, lat:pendingLat, lon:pendingLon, note,
      time:now.toISOString(),
      timeDisplay:now.toLocaleString('en-CA',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      photos:pendingPhotos.map(p=>p.dataUrl) };
    const idx=capturedPoints.length;
    capturedPoints.push(pt); pointMarkers.push(null);
    createPointMarker(pt,idx);
    savePointsLocal();
    document.getElementById('s-pts').textContent=capturedPoints.length;
    document.getElementById('note-modal').classList.remove('show');
    showToast('Point '+pt.num+' saved'+(pt.photos.length?' 📷':''));
  }
}

function deletePoint() {
  if (editingIdx===null) return;
  if (!confirm('Delete Point '+(capturedPoints[editingIdx].num||editingIdx+1)+'?')) return;
  if (pointMarkers[editingIdx]){map.removeLayer(pointMarkers[editingIdx]);}
  capturedPoints.splice(editingIdx,1); pointMarkers.splice(editingIdx,1);
  capturedPoints.forEach((pt,i)=>{
    pt.num=i+1;
    if (pointMarkers[i]){map.removeLayer(pointMarkers[i]);pointMarkers[i]=null;}
    createPointMarker(pt,i);
  });
  document.getElementById('s-pts').textContent=capturedPoints.length;
  savePointsLocal(); cancelPoint(); showToast('Point deleted');
}

function cancelPoint() {
  if (recognition){recognition.stop();recognition=null;}
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('note-box').querySelector('h3').textContent='Capture Point';
  document.getElementById('note-meta').textContent='';
  document.getElementById('note-coords').textContent='';
  document.getElementById('note-delete').style.display='none';
  editingIdx=null;
  document.getElementById('note-modal').classList.remove('show');
}

function clearPoints() {
  capturedPoints=[]; pointMarkers.forEach(m=>{if(m)map.removeLayer(m);}); pointMarkers=[];
  document.getElementById('s-pts').textContent='0';
  try{localStorage.removeItem('fmv_points');}catch(e){}
  showToast('Points cleared');
}

function savePointsLocal() {
  try { localStorage.setItem('fmv_points',JSON.stringify(capturedPoints)); } catch(e){}
}

function loadPointsLocal() {
  try {
    const pts=JSON.parse(localStorage.getItem('fmv_points')||'[]');
    pts.forEach(pt=>{ const idx=capturedPoints.length; capturedPoints.push(pt); pointMarkers.push(null); createPointMarker(pt,idx); });
    if (pts.length) { document.getElementById('s-pts').textContent=capturedPoints.length; showToast('Loaded '+pts.length+' saved point(s)'); }
    const tracks=JSON.parse(localStorage.getItem('fmv_tracks')||'[]');
    tracks.forEach(t=>{ L.polyline(t.coords,{color:'#ce93d8',weight:2,opacity:.7,dashArray:'5,4'}).addTo(map)
      .bindPopup('<span style="font-family:monospace;font-size:11px;">Saved track<br>'+t.time.slice(0,10)+'</span>'); });
  } catch(e){}
}

// ── VOICE ─────────────────────────────────────────────────────────────────────
function toggleMic() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR){showToast('Speech not supported');return;}
  if (recognition){recognition.stop();recognition=null;document.getElementById('mic-btn').classList.remove('listening');return;}
  recognition=new SR(); recognition.continuous=true; recognition.interimResults=true; recognition.lang='en-CA';
  const base=document.getElementById('note-input').value;
  let finalAccum='';
  recognition.onresult=(e)=>{
    let nf='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)nf+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    finalAccum+=nf;
    document.getElementById('note-input').value=(base?(base+' '):'')+finalAccum+interim;
  };
  recognition.onerror=()=>{recognition=null;document.getElementById('mic-btn').classList.remove('listening');showToast('Mic error');};
  recognition.onend=()=>{recognition=null;document.getElementById('mic-btn').classList.remove('listening');};
  recognition.start(); document.getElementById('mic-btn').classList.add('listening'); showToast('Listening…');
}

// ── PHOTOS ────────────────────────────────────────────────────────────────────
document.getElementById('photo-input').addEventListener('change',async function(e){
  const files=Array.from(e.target.files); e.target.value='';
  for(const f of files){ const d=await resizePhoto(f,1200); pendingPhotos.push({dataUrl:d,name:f.name}); }
  renderPhotoStrip(); showToast(pendingPhotos.length+' photo(s) attached');
});

function resizePhoto(file,maxPx) {
  return new Promise(res=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      const sc=Math.min(1,maxPx/Math.max(img.width,img.height));
      const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url); res(c.toDataURL('image/jpeg',.82));
    }; img.src=url;
  });
}

function renderPhotoStrip() {
  const strip=document.getElementById('photo-strip'); strip.innerHTML='';
  const addBtn=document.createElement('button'); addBtn.id='photo-btn'; addBtn.textContent='📷';
  addBtn.onclick=()=>document.getElementById('photo-input').click(); strip.appendChild(addBtn);
  pendingPhotos.forEach((ph,i)=>{
    const wrap=document.createElement('div'); wrap.className='photo-thumb-wrap';
    const img=document.createElement('img'); img.className='photo-thumb'; img.src=ph.dataUrl;
    const del=document.createElement('button'); del.className='photo-del'; del.textContent='✕';
    del.onclick=()=>{pendingPhotos.splice(i,1);renderPhotoStrip();};
    wrap.appendChild(img); wrap.appendChild(del); strip.appendChild(wrap);
  });
}

// ── PDF OVERLAY ───────────────────────────────────────────────────────────────
document.getElementById('pdf-input').addEventListener('change',async function(e){
  const file=e.target.files[0]; if(!file)return; e.target.value='';
  showToast('Reading PDF…');
  const buf=await file.arrayBuffer();
  const geo=parseGeo(new Uint8Array(buf));
  if(!geo){showToast('No georeference found',3000);return;}
  showToast('Rendering…');
  const imgUrl=await renderPDF(buf);
  const lats=geo.corners.map(c=>c.lat), lons=geo.corners.map(c=>c.lon);
  pdfBounds=L.latLngBounds([Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]);
  if(pdfOverlay)map.removeLayer(pdfOverlay);
  pdfOverlay=L.imageOverlay(imgUrl,pdfBounds,{opacity:.85,interactive:false}).addTo(map);
  pdfVisible=true;
  document.getElementById('btn-pdf').style.display='flex';
  document.getElementById('btn-pdf').classList.add('active-gold');
  document.getElementById('fly-map-btn').style.display='block';
  document.getElementById('load-pdf-btn').classList.add('has-map');
  document.getElementById('map-label').textContent=file.name.replace(/\.pdf$/i,'');
  map.fitBounds(pdfBounds,{padding:[30,30]}); showToast('PDF loaded');
});

function togglePDF() {
  if(!pdfOverlay)return; pdfVisible=!pdfVisible;
  const btn=document.getElementById('btn-pdf');
  if(pdfVisible){pdfOverlay.setOpacity(.85);btn.classList.add('active-gold');}
  else{pdfOverlay.setOpacity(0);btn.classList.remove('active-gold');}
  showToast('PDF overlay '+(pdfVisible?'on':'off'));
}
function flyToMap(){if(pdfBounds)map.flyToBounds(pdfBounds,{padding:[30,30],duration:1});}

function parseGeo(bytes) {
  const text=new TextDecoder('latin1').decode(bytes);
  const gm=text.match(/\/GPTS\s*\[([^\]]+)\]/); if(!gm)return null;
  const gpts=gm[1].trim().split(/\s+/).map(Number);
  const lm=text.match(/\/LPTS\s*\[([^\]]+)\]/);
  const lpts=lm?lm[1].trim().split(/\s+/).map(Number):[0,0,0,1,1,1,1,0];
  const corners=[];
  for(let i=0;i<4;i++)corners.push({lat:gpts[i*2],lon:gpts[i*2+1],px:lpts[i*2],py:lpts[i*2+1]});
  return{corners};
}

async function renderPDF(buf) {
  await loadPdfJs();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  const sc=(window.devicePixelRatio||2)*1.5;
  const vp=page.getViewport({scale:sc});
  const c=document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
  await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  return c.toDataURL('image/jpeg',.92);
}

async function loadPdfJs() {
  if(window.pdfjsLib)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
document.getElementById('import-input').addEventListener('change',async function(e){
  const files=Array.from(e.target.files); e.target.value='';
  let totalPts=0,totalTracks=0;
  for(const file of files){
    try{
      const text=await file.text();
      const isGPX=file.name.toLowerCase().endsWith('.gpx');
      if(isGPX){
        const r=importGPX(text);
        totalPts+=r.pts; totalTracks+=r.tracks;
      } else {
        const r=importGeoJSON(text);
        totalPts+=r.pts; totalTracks+=r.tracks;
      }
    }catch(err){showToast('Parse error: '+file.name,3000);}
  }
  document.getElementById('s-pts').textContent=capturedPoints.length;
  const msg=[totalPts&&(totalPts+' point(s)'),totalTracks&&(totalTracks+' track(s)')].filter(Boolean).join(' + ');
  showToast(msg?'Imported: '+msg:'Nothing imported',3000);
});

function importGeoJSON(text){
  const gj=JSON.parse(text);
  if(gj.type!=='FeatureCollection') return {pts:0,tracks:0};
  let pts=0,tracks=0;
  const bounds=[];
  for(const feat of gj.features){
    const geom=feat.geometry,props=feat.properties||{};
    if(geom.type==='Point'){
      const [lon,lat]=geom.coordinates;
      const idx=capturedPoints.length;
      capturedPoints.push({lat,lon,note:props.note||'',time:props.time||'',timeDisplay:props.time_local||'',photos:[],imported:true,num:idx+1});
      pointMarkers.push(null); createPointMarker(capturedPoints[idx],idx);
      bounds.push([lat,lon]); pts++;
    } else if(geom.type==='LineString'){
      const coords=geom.coordinates.map(c=>[c[1],c[0]]);
      L.polyline(coords,{color:'#ce93d8',weight:3,opacity:.85,dashArray:'6,4'}).addTo(map)
       .bindPopup('<span style="font-family:monospace;font-size:11px;">Imported track<br>'+coords.length+' pts</span>');
      coords.forEach(c=>bounds.push(c)); tracks++;
    }
  }
  if(bounds.length)map.flyToBounds(L.latLngBounds(bounds),{padding:[40,40],duration:1});
  return {pts,tracks};
}

function importGPX(text){
  const parser=new DOMParser();
  const xml=parser.parseFromString(text,'application/xml');
  let pts=0,tracks=0;
  const allBounds=[];

  // Tracks — <trk><trkseg><trkpt>
  const trks=xml.querySelectorAll('trk');
  trks.forEach(trk=>{
    const name=trk.querySelector('name')?.textContent||'GPX Track';
    const segs=trk.querySelectorAll('trkseg');
    segs.forEach(seg=>{
      const trkpts=seg.querySelectorAll('trkpt');
      if(!trkpts.length)return;
      const coords=Array.from(trkpts).map(pt=>[
        parseFloat(pt.getAttribute('lat')),
        parseFloat(pt.getAttribute('lon'))
      ]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
      if(coords.length<2)return;
      L.polyline(coords,{color:'#ce93d8',weight:3,opacity:.85,dashArray:'6,4'}).addTo(map)
       .bindPopup('<span style="font-family:monospace;font-size:11px;">'+name+'<br>'+coords.length+' pts</span>');
      coords.forEach(c=>allBounds.push(c));
      tracks++;
    });
  });

  // Routes — <rte><rtept>
  const rtes=xml.querySelectorAll('rte');
  rtes.forEach(rte=>{
    const name=rte.querySelector('name')?.textContent||'GPX Route';
    const rtepts=rte.querySelectorAll('rtept');
    if(!rtepts.length)return;
    const coords=Array.from(rtepts).map(pt=>[
      parseFloat(pt.getAttribute('lat')),
      parseFloat(pt.getAttribute('lon'))
    ]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
    if(coords.length<2)return;
    L.polyline(coords,{color:'#80cbc4',weight:3,opacity:.85,dashArray:'6,4'}).addTo(map)
     .bindPopup('<span style="font-family:monospace;font-size:11px;">'+name+'<br>'+coords.length+' pts</span>');
    coords.forEach(c=>allBounds.push(c));
    tracks++;
  });

  // Waypoints — <wpt>
  const wpts=xml.querySelectorAll('wpt');
  wpts.forEach(wpt=>{
    const lat=parseFloat(wpt.getAttribute('lat'));
    const lon=parseFloat(wpt.getAttribute('lon'));
    if(isNaN(lat)||isNaN(lon))return;
    const name=wpt.querySelector('name')?.textContent||'';
    const desc=wpt.querySelector('desc')?.textContent||'';
    const time=wpt.querySelector('time')?.textContent||'';
    const note=[name,desc].filter(Boolean).join(' — ');
    const idx=capturedPoints.length;
    capturedPoints.push({lat,lon,note,time,timeDisplay:time?new Date(time).toLocaleString('en-CA'):'',photos:[],imported:true,num:idx+1});
    pointMarkers.push(null); createPointMarker(capturedPoints[idx],idx);
    allBounds.push([lat,lon]); pts++;
  });

  if(allBounds.length)map.flyToBounds(L.latLngBounds(allBounds),{padding:[40,40],duration:1});
  return {pts,tracks};
}
// ── EXPORT ────────────────────────────────────────────────────────────────────
function toggleExport(){
  const p=document.getElementById('export-panel'); p.classList.toggle('open');
  if(p.classList.contains('open')){
    document.getElementById('exp-stats').textContent='Track: '+trackLog.length+' pts  |  Points: '+capturedPoints.length;
    document.getElementById('exp-track-btn').disabled=trackLog.length===0;
    document.getElementById('exp-pts-btn').disabled=capturedPoints.length===0;
  }
}

function exportTrack(){
  if(!trackLog.length)return;
  const gj={type:'FeatureCollection',features:[{type:'Feature',
    geometry:{type:'LineString',coordinates:trackLog.map(p=>[p[1],p[0]])},
    properties:{recorded:new Date().toISOString(),points:trackLog.length}}]};
  dlJSON(gj,'track_'+ts()+'.geojson'); showToast('Track exported');
}

function exportPoints(){
  if(!capturedPoints.length)return;
  const gj={type:'FeatureCollection',features:capturedPoints.map((p,i)=>({
    type:'Feature',
    geometry:{type:'Point',coordinates:[p.lon,p.lat]},
    properties:{id:p.num||(i+1),note:p.note,time:p.time,time_local:p.timeDisplay||p.time,
      photo_count:p.photos?p.photos.length:0,photos:p.photos||[]}
  }))};
  dlJSON(gj,'points_'+ts()+'.geojson'); showToast('Points exported');
}

function dlJSON(obj,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:'application/geo+json'}));
  a.download=name; a.click();
}
function ts(){return new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg,dur=2000){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),dur);
}

startGPS();
loadPointsLocal();
